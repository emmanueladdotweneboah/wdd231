<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recommendation Submitted | Anime Explorer</title>

    <meta name="description" content="Thank you for your anime recommendation.">
    <meta name="author" content="Your Name">

    <link rel="icon" href="images/favicon.ico">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/larger.css">

</head>

<body>

    <main class="thank-you">

        <h1>Thank You!</h1>

        <p id="message"></p>

        <a href="index.html" class="button">
            Return Home
        </a>

    </main>

    <script>

        const params =
            new URLSearchParams(window.location.search);

        const anime =
            params.get("anime");

        const username =
            params.get("username");

        document.querySelector("#message").textContent =
            `${username}, thank you for recommending "${anime}"!`;

    </script>

</body>

</html>
